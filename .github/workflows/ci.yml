name: CI

# Validation gate for every PR and every push to master.
#
# Deployment is handled by Vercel's native Git integration (it auto-deploys
# master), so this workflow does NOT deploy — it only validates. To have GitHub
# Actions own the deploy instead, add a deploy job using the Vercel CLI
# (vercel pull / build / deploy --prebuilt --prod) with VERCEL_TOKEN /
# VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets, and turn off Vercel's production
# Git auto-deploy to avoid double-deploying.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A newer commit on the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate · typecheck / lint / test / build
    runs-on: ubuntu-latest
    env:
      # Pages are force-dynamic, so nothing queries the DB at build time.
      # A placeholder URL just satisfies env validation in src/lib/env.ts.
      DATABASE_URL: postgresql://user:pass@localhost:5432/placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Keep Next/Sentry from attempting source-map upload without a token.
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # `npm ci` runs the postinstall hook (prisma generate); keep an explicit
      # generate too so a future --ignore-scripts can't break typecheck/tests.
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
