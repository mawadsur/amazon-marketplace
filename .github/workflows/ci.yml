name: CI/CD

# Validate every PR and every push to master; deploy master to Vercel production.
#
# Required repo secrets for the deploy job (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       - Vercel account token (vercel.com/account/tokens)
#   VERCEL_ORG_ID      - from `vercel link` → .vercel/project.json ("orgId")
#   VERCEL_PROJECT_ID  - from `vercel link` → .vercel/project.json ("projectId")
#
# Runtime env (DATABASE_URL, ANTHROPIC_API_KEY, S3_*, etc.) lives in the Vercel
# project's Production environment and is pulled by `vercel pull` at deploy time —
# do NOT duplicate those as GitHub secrets.
#
# NOTE: if this repo also has Vercel's Git integration auto-deploying master,
# disable that project's production Git auto-deploy so you don't double-deploy.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A newer commit on the same ref cancels the in-flight run.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate · typecheck / lint / test / build
    runs-on: ubuntu-latest
    env:
      # Pages are force-dynamic, so nothing queries the DB at build time.
      # A placeholder URL just satisfies env validation in src/lib/env.ts.
      DATABASE_URL: postgresql://user:pass@localhost:5432/placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Keep Next/Sentry from attempting source-map upload without a token.
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # `npm ci` runs the postinstall hook (prisma generate); keep an explicit
      # generate too so a future --ignore-scripts can't break typecheck/tests.
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Vercel (production)
    needs: validate
    # Only deploy on a direct push to master — never on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel (uses production env)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed → $url"
